name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish self-contained exe
        run: |
          dotnet publish WeatherWallpaper/WeatherWallpaper.csproj `
            -c Release `
            -r win-x64 `
            -p:PublishSingleFile=true `
            -p:SelfContained=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:IncludeAllContentForSelfExtract=true `
            -p:DebugType=embedded `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -o publish

      - name: Copy standalone exe
        shell: pwsh
        run: |
          Copy-Item "publish\WeatherWallpaper.exe" "WeatherWallpaper-v${{ steps.version.outputs.VERSION }}-win-x64.exe"

      - name: Create zip package
        shell: pwsh
        run: |
          Compress-Archive -Path publish\* -DestinationPath "WeatherWallpaper-v${{ steps.version.outputs.VERSION }}-win-x64.zip"

      - name: Verify build artifacts
        shell: pwsh
        run: |
          $exe = "publish\WeatherWallpaper.exe"
          if (!(Test-Path $exe)) {
            Write-Error "WeatherWallpaper.exe not found!"
            exit 1
          }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "WeatherWallpaper.exe size: $([math]::Round($size, 2)) MB"
          
          $zip = "WeatherWallpaper-v${{ steps.version.outputs.VERSION }}-win-x64.zip"
          if (!(Test-Path $zip)) {
            Write-Error "Zip package not found!"
            exit 1
          }
          $zipSize = (Get-Item $zip).Length / 1MB
          Write-Host "Zip package size: $([math]::Round($zipSize, 2)) MB"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WeatherWallpaper v${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'Beta') || contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'rc') }}
          generate_release_notes: true
          files: |
            WeatherWallpaper-v${{ steps.version.outputs.VERSION }}-win-x64.exe
            WeatherWallpaper-v${{ steps.version.outputs.VERSION }}-win-x64.zip

  download-test:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "WeatherWallpaper-v${{ steps.version.outputs.VERSION }}-win-x64.zip"
          
          # Wait for release to be available
          $maxRetries = 10
          $retryDelay = 15
          for ($i = 0; $i -lt $maxRetries; $i++) {
            try {
              gh release download $tag --pattern $asset --repo ${{ github.repository }}
              Write-Host "Downloaded $asset successfully"
              break
            } catch {
              if ($i -eq $maxRetries - 1) { throw }
              Write-Host "Release not ready yet, retrying in ${retryDelay}s... ($($i+1)/$maxRetries)"
              Start-Sleep -Seconds $retryDelay
            }
          }

      - name: Verify downloaded package
        shell: pwsh
        run: |
          $zip = "WeatherWallpaper-v${{ steps.version.outputs.VERSION }}-win-x64.zip"
          
          # Check zip exists and is valid
          if (!(Test-Path $zip)) {
            Write-Error "Downloaded zip not found!"
            exit 1
          }
          
          # Extract and verify
          Expand-Archive -Path $zip -DestinationPath "test-extract"
          
          $exe = "test-extract\WeatherWallpaper.exe"
          if (!(Test-Path $exe)) {
            Write-Error "WeatherWallpaper.exe not found in extracted package!"
            exit 1
          }
          
          # Verify exe is a valid PE file
          $bytes = [System.IO.File]::ReadAllBytes($exe)
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            Write-Error "WeatherWallpaper.exe is not a valid Windows executable!"
            exit 1
          }
          
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "Download test PASSED"
          Write-Host "  - Zip extracted successfully"
          Write-Host "  - WeatherWallpaper.exe found ($([math]::Round($size, 2)) MB)"
          Write-Host "  - Valid PE executable confirmed"
